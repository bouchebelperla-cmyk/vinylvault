<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Discover &mdash; The Vinyl Vault</title>
  <meta name="description" content="Discover albums from across the music charts. Search by album or filter by genre, powered by the Last.fm API." />

  <!-- Bootstrap 5 (layout/grid utilities only; all visual styling is hand-written CSS3) -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />

  <!-- Google Fonts: Righteous (display) + Poppins (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Righteous&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/discover.css" />
</head>
<body>
  <!-- Consistent site navigation (identical markup on every page) -->
  <header class="vault-nav">
    <nav class="container d-flex align-items-center justify-content-between" aria-label="Primary">
      <a class="vault-brand" href="index.html">
        <span class="vault-brand__mark" aria-hidden="true">&#9210;</span>
        The Vinyl&nbsp;Vault
      </a>
      <ul class="vault-nav__links">
        <li><a href="index.html">Home</a></li>
        <li><a class="is-active" href="discover.html" aria-current="page">Discover</a></li>
        <li><a href="submit-review.html">Submit&nbsp;Review</a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <section class="vault-hero" aria-labelledby="discover-title">
      <p class="vault-eyebrow">Live from the charts</p>
      <h1 id="discover-title" class="vault-title">Discover</h1>
      <p class="vault-subtitle">
        Dig beyond the Vault’s own shelves. Search the wider catalogue or filter by genre —
        results stream in live from the Last.fm music database.
      </p>
    </section>

    <!-- ============ CONTROLS: search + genre filter ============ -->
    <section class="discover-controls" aria-label="Search and filter albums">
      <form class="discover-search" id="discover-search" role="search">
        <label class="visually-hidden-label" for="discover-query">Search albums</label>
        <span class="discover-search__icon" aria-hidden="true">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="9" cy="9" r="6"/><path d="M14 14l4 4"/></svg>
        </span>
        <input
          type="search"
          id="discover-query"
          class="discover-search__input"
          placeholder="Search for an album…"
          autocomplete="off"
        />
      </form>

      <!-- Genre chips populated/handled by the AlbumDiscovery class. -->
      <div class="discover-filters" id="discover-filters" role="group" aria-label="Filter by genre"></div>
    </section>

    <!-- ============ STATUS REGION (loading / error / empty) ============ -->
    <!-- aria-live so screen readers are told when results change. -->
    <div class="discover-status" id="discover-status" role="status" aria-live="polite"></div>

    <!-- ============ RESULTS ============ -->
    <section class="discover-results" id="discover-results" aria-label="Album results"></section>

    <div class="discover-more">
      <button type="button" class="vault-btn vault-btn--ghost" id="discover-more" hidden>Load more</button>
    </div>
  </main>

  <footer class="vault-footer">
    <div class="container">
      <p>&copy; 2026 The Vinyl Vault &middot; Built for crate diggers.</p>
    </div>
  </footer>

  <script src="js/discover.js"></script>
</body>
</html>
