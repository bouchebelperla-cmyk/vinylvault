<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reviews &amp; Ratings &mdash; The Vinyl Vault</title>
  <meta name="description" content="Read the community's record reviews and post your own rating." />

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Righteous&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/stars.css" />
  <link rel="stylesheet" href="css/reviews.css" />
</head>
<body>
  <header class="vault-nav">
    <nav class="container d-flex align-items-center justify-content-between" aria-label="Primary">
      <a class="vault-brand" href="index.html">
        <span class="vault-brand__mark" aria-hidden="true">&#9210;</span>
        The Vinyl&nbsp;Vault
      </a>
      <ul class="vault-nav__links">
        <li><a href="index.html">Home</a></li>
        <li><a href="discover.html">Discover</a></li>
        <li><a class="is-active" href="reviews.html" aria-current="page">Reviews</a></li>
        <li><a href="submit-review.html">Submit&nbsp;Review</a></li>
        <li><a href="login.html">Sign&nbsp;In</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="container" aria-labelledby="reviews-title">
      <!-- Greeting + sign out -->
      <div class="page-band">
        <div>
          <h1 id="reviews-title" class="page-band__title">Reviews &amp; Ratings</h1>
          <p class="page-band__sub">Read what the crate-diggers are saying — then add your own.</p>
        </div>
        <div class="page-who">
          <img id="who-avatar" class="page-who__avatar" alt="" hidden />
          <span>Signed in as <strong class="page-who__name" id="who-label">listener</strong></span>
          <button type="button" class="vault-btn vault-btn--ghost" data-signout>Sign out</button>
        </div>
      </div>

      <!-- Album of the Week spotlight (admin-toggled) -->
      <section id="aotw" class="aotw" aria-label="Album of the Week" hidden></section>

      <div class="row g-4">
        <!-- New review form -->
        <div class="col-lg-5">
          <form id="review-form" class="review-form review-form-card" novalidate>
            <h2>Post a review</h2>

            <span class="review-form__label" id="rating-label">Your rating</span>
            <div class="review-form__stars" id="star-input" aria-labelledby="rating-label"></div>
            <p class="review-form__error" id="rating-error" role="alert" hidden>Please pick a star rating.</p>

            <label class="review-form__label" for="review-text">Your review</label>
            <textarea id="review-text" name="review-text"
                      placeholder="What does this pressing sound like? Mastering, packaging, the standout track…"
                      required></textarea>

            <button type="submit" class="vault-btn vault-btn--primary w-100">Publish review</button>
          </form>
        </div>

        <!-- Review list -->
        <div class="col-lg-7">
          <div id="review-list" class="review-list" aria-live="polite"></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="vault-footer">
    <div class="container">
      <p>&copy; 2026 The Vinyl Vault &middot; Built for crate diggers.</p>
    </div>
  </footer>

  <!-- Curated data (for the Album of the Week spotlight), then the ES6 classes. -->
  <script src="js/data/albums.js"></script>
  <script src="js/auth-manager.js"></script>
  <script src="js/star-rating.js"></script>
  <script src="js/review-engine.js"></script>
  <script src="js/site-settings.js"></script>
  <script src="js/reviews-page.js"></script>
</body>
</html>
